name: build-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build-type:
        description: "manual override of build type"
        required: false
        default: "release"

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.22.0"

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Arm
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest" # Intel
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "store_path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev libxdo-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Update version files from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          export CI=1
          bash scripts/update-version.sh "$version"

      - name: Generate tools-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/gen-tools-manifest.py --output src-tauri/tools-manifest.json --yt-dlp-tag "$(cat yt-dlp-version.txt)"

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_NAME#v}
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG_NAME}$" | head -n 1 || true)

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGE_RANGE="${PREVIOUS_TAG}..${TAG_NAME}"
          else
            CHANGE_RANGE="${TAG_NAME}"
          fi

          CHANGE_LOG=$(git log "$CHANGE_RANGE" --format='- %s' --no-merges --invert-grep --grep='^v[0-9]\+\.[0-9]\+\.[0-9]\+$')
          if [ -z "$CHANGE_LOG" ]; then
            CHANGE_LOG="- 変更なし"
          fi

          {
            echo "Release $TAG_NAME"
            echo
            echo "Version: $VERSION"
            echo
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "Changes since $PREVIOUS_TAG:"
            else
              echo "Changes:"
            fi
            echo "$CHANGE_LOG"
          } > release-notes.md
          
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          cat release-notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.BUILD_SECRET_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.BUILD_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'yt-dlp-GUI v__VERSION__'
          releaseBody: ${{ steps.release_notes.outputs.release_notes }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload tools-manifest.json as release asset
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/tools-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
